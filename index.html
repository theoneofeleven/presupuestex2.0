<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resaicar — Generador de Documentos v2</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --green:#23B24B;--green-h:#1c9a3f;--green-l:#e6f7ec;--green-ll:#f0faf4;
  --dark:#111;--dark2:#1e1e1e;--mid:#555;--muted:#999;
  --border:#e2e2e2;--border2:#ececec;
  --bg:#f4f4f2;--surface:#fff;--surface2:#fafaf9;
  --text:#111;--text2:#555;--text3:#999;
  --red:#e74c3c;--red-l:#fdf0ef;--amber:#f39c12;--amber-l:#fef9ec;--blue:#2980b9;--blue-l:#eaf4fb;
  --radius:10px;--radius-sm:7px;
  --shadow:0 1px 4px rgba(0,0,0,.07),0 4px 16px rgba(0,0,0,.05);
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;-webkit-font-smoothing:antialiased}

/* LAYOUT */
.shell{display:flex;min-height:100vh}
.sidebar{width:220px;background:var(--dark);display:flex;flex-direction:column;position:fixed;top:0;bottom:0;left:0;z-index:200}
.main{margin-left:220px;flex:1;display:flex;flex-direction:column;min-height:100vh}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 28px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.page{padding:28px;flex:1}

/* SIDEBAR */
.sb-logo{padding:20px 18px 16px;border-bottom:1px solid rgba(255,255,255,.08)}
.sb-name{font-size:22px;font-weight:300;color:#fff;letter-spacing:-.5px;line-height:1}
.sb-dot{color:var(--green)}
.sb-tag{font-size:6.5px;letter-spacing:3px;color:rgba(255,255,255,.35);margin-top:4px}
.sb-tag-plus{color:var(--green)}
.sb-nav{padding:12px 0;flex:1}
.sb-section{padding:8px 16px 4px;font-size:9px;font-weight:700;letter-spacing:2px;color:rgba(255,255,255,.25);text-transform:uppercase}
.sb-item{display:flex;align-items:center;gap:10px;padding:9px 18px;color:rgba(255,255,255,.6);cursor:pointer;transition:all .15s;font-size:13px;font-weight:500;border-left:3px solid transparent}
.sb-item:hover{color:#fff;background:rgba(255,255,255,.05)}
.sb-item.active{color:#fff;background:rgba(35,178,75,.12);border-left-color:var(--green)}
.sb-item i{font-size:17px;flex-shrink:0}
.sb-footer{padding:14px 18px;border-top:1px solid rgba(255,255,255,.08)}
.sb-version{font-size:10px;color:rgba(255,255,255,.2)}

/* TOPBAR */
.tb-title{font-size:16px;font-weight:600;color:var(--text)}
.tb-sub{font-size:12px;color:var(--text3);margin-top:1px}
.tb-actions{display:flex;gap:8px;align-items:center}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:7px;padding:8px 18px;border-radius:var(--radius-sm);border:none;cursor:pointer;font-family:'Inter',sans-serif;font-size:13px;font-weight:600;transition:all .15s;text-decoration:none;white-space:nowrap}
.btn-green{background:var(--green);color:#fff}.btn-green:hover{background:var(--green-h);transform:translateY(-1px)}
.btn-dark{background:var(--dark);color:#fff}.btn-dark:hover{background:#333}
.btn-ghost{background:transparent;color:var(--mid);border:1px solid var(--border)}.btn-ghost:hover{background:var(--surface2)}
.btn-red{background:var(--red-l);color:var(--red);border:1px solid #f5c5c0}.btn-red:hover{background:#fbe0de}
.btn-sm{padding:6px 12px;font-size:12px}
.btn-icon{padding:7px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface);cursor:pointer;color:var(--mid);transition:all .15s;display:inline-flex;align-items:center;justify-content:center}
.btn-icon:hover{background:var(--surface2);color:var(--text)}

/* CARDS */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px 24px;margin-bottom:16px}
.card-title{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text2);margin-bottom:14px;display:flex;align-items:center;gap:8px}
.card-title i{font-size:15px;color:var(--green)}

/* FORM */
.fg{display:grid;gap:14px}
.fg-2{grid-template-columns:1fr 1fr}
.fg-3{grid-template-columns:1fr 1fr 1fr}
.full{grid-column:1/-1}
.field label{display:block;font-size:11px;font-weight:700;color:var(--text2);letter-spacing:.04em;text-transform:uppercase;margin-bottom:5px}
.field-row{display:flex;gap:6px;align-items:stretch}
.field-row .prefix{padding:0 10px;background:var(--surface2);border:1px solid var(--border);border-right:none;border-radius:var(--radius-sm) 0 0 var(--radius-sm);display:flex;align-items:center;font-size:12px;color:var(--text3);white-space:nowrap}
.field-row input,.field-row select{border-radius:0 var(--radius-sm) var(--radius-sm) 0!important}
input,select,textarea{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);font-family:'Inter',sans-serif;font-size:13px;color:var(--text);background:var(--surface2);outline:none;transition:border .15s,box-shadow .15s}
input:focus,select:focus,textarea:focus{border-color:var(--green);box-shadow:0 0 0 3px rgba(35,178,75,.1);background:#fff}
textarea{resize:vertical;line-height:1.6}
select option{font-family:'Inter',sans-serif}

/* PROGRESS */
.progress{display:flex;gap:0;margin-bottom:24px}
.prog-step{flex:1;position:relative}
.prog-step:not(:last-child)::after{content:'';position:absolute;top:12px;left:50%;width:100%;height:2px;background:var(--border);z-index:0}
.prog-step.done::after{background:var(--green)}
.prog-dot-wrap{display:flex;flex-direction:column;align-items:center;gap:6px;position:relative;z-index:1}
.prog-dot{width:26px;height:26px;border-radius:50%;border:2px solid var(--border);background:var(--surface);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--text3);transition:all .2s}
.prog-step.done .prog-dot{background:var(--green);border-color:var(--green);color:#fff}
.prog-step.active .prog-dot{border-color:var(--green);color:var(--green);box-shadow:0 0 0 4px rgba(35,178,75,.15)}
.prog-label{font-size:11px;color:var(--text3);font-weight:500;text-align:center}
.prog-step.active .prog-label{color:var(--green);font-weight:600}
.prog-step.done .prog-label{color:var(--text2)}

/* ITEMS TABLE */
.items-tbl{width:100%;border-collapse:collapse}
.items-tbl th{font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--text3);padding:6px 8px;border-bottom:2px solid var(--border2);text-align:left}
.items-tbl td{padding:5px 4px;vertical-align:middle}
.items-tbl tr:nth-child(even) td{background:var(--surface2)}
.items-tbl input{font-size:13px;padding:7px 9px}
.item-nr{font-size:11px;font-weight:700;color:var(--text3);text-align:center;width:30px}
.item-total{font-size:13px;font-weight:700;color:var(--dark);text-align:right;padding-right:10px!important;min-width:90px}
.add-row{display:flex;align-items:center;gap:8px;padding:10px 0;cursor:pointer;color:var(--green);font-size:13px;font-weight:600;border:1px dashed var(--green);border-radius:var(--radius-sm);justify-content:center;margin-top:6px;transition:background .15s}
.add-row:hover{background:var(--green-ll)}
.total-bar{background:var(--green-l);border:1px solid #b8dfc8;border-radius:var(--radius-sm);padding:12px 16px;display:flex;justify-content:space-between;align-items:center;margin-top:10px}
.total-bar-label{font-size:13px;font-weight:600;color:var(--green-h)}
.total-bar-val{font-size:20px;font-weight:700;color:var(--green-h)}

/* CATALOG MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:500;display:none;align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:var(--surface);border-radius:var(--radius);padding:24px;width:600px;max-width:95vw;max-height:85vh;overflow:auto;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
.modal-title{font-size:16px;font-weight:700}
.cat-search{width:100%;margin-bottom:14px}
.cat-item{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:8px;cursor:pointer;transition:all .15s}
.cat-item:hover{border-color:var(--green);background:var(--green-ll)}
.cat-item-name{font-size:13px;font-weight:600}
.cat-item-desc{font-size:11px;color:var(--text3);margin-top:2px}
.cat-item-price{font-size:13px;font-weight:700;color:var(--green)}
.cat-empty{text-align:center;padding:32px;color:var(--text3)}

/* HISTORY */
.hist-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 18px;display:flex;align-items:center;gap:14px;margin-bottom:10px;transition:box-shadow .15s}
.hist-item:hover{box-shadow:var(--shadow)}
.hist-nr{font-size:14px;font-weight:700}
.hist-client{font-size:12px;color:var(--text2);margin-top:2px}
.hist-date{font-size:11px;color:var(--text3);margin-top:2px}
.hist-total{font-size:15px;font-weight:700;color:var(--green);margin-left:auto;margin-right:12px}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;margin-left:8px}
.badge-presupuesto{background:var(--blue-l);color:var(--blue)}
.badge-enviado{background:var(--amber-l);color:var(--amber)}
.badge-aceptado{background:var(--green-l);color:var(--green-h)}
.badge-rechazado{background:var(--red-l);color:var(--red)}
.status-sel{font-size:12px;padding:5px 8px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface2);cursor:pointer;font-family:'Inter',sans-serif}

/* PDF PREVIEW */
.preview-bg{background:#d8d8d8;border-radius:var(--radius);padding:20px;overflow:auto}
.pdf{background:#fff;max-width:720px;margin:0 auto;padding:32px 36px;font-family:'Inter',sans-serif;color:#111;font-size:12px;box-shadow:0 4px 24px rgba(0,0,0,.18)}
.pdf-hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px;padding-bottom:14px;border-bottom:2.5px solid #23B24B}
.pdf-logo{font-size:28px;font-weight:300;letter-spacing:-.5px;line-height:1}
.pdf-logo-dot{color:#23B24B}
.pdf-tag{font-size:7px;letter-spacing:3px;color:#888;margin-top:3px}
.pdf-tag-plus{color:#23B24B;font-weight:700}
.pdf-co{text-align:right;font-size:9.5px;color:#666;line-height:1.7}
.pdf-meta{display:grid;grid-template-columns:1fr 1fr;border:1px solid #ddd;border-radius:3px;overflow:hidden;margin-bottom:14px}
.pdf-mc{padding:8px 12px;background:#fafafa;border-right:1px solid #ddd;border-bottom:1px solid #ddd}
.pdf-mc:nth-child(even){border-right:none}
.pdf-mc:nth-last-child(-n+2){border-bottom:none}
.pdf-ml{font-size:8px;font-weight:700;color:#aaa;text-transform:uppercase;letter-spacing:.06em}
.pdf-mv{font-size:11px;font-weight:700;color:#111;margin-top:2px}
.pdf-cli{background:#f0faf4;border:1px solid #b8e0c8;border-radius:3px;padding:11px 14px;margin-bottom:14px}
.pdf-cli-t{font-size:8px;font-weight:700;color:#1a8a39;text-transform:uppercase;letter-spacing:.1em;margin-bottom:7px}
.pdf-cli-g{display:grid;grid-template-columns:1fr 1fr;gap:3px 16px;font-size:10.5px}
.pdf-tbl{width:100%;border-collapse:collapse;margin-bottom:14px;font-size:10.5px}
.pdf-tbl th{background:#111;color:#fff;padding:7px 10px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;text-align:left}
.pdf-tbl td{padding:7px 10px;border-bottom:1px solid #eee;vertical-align:top;line-height:1.5}
.pdf-tbl tr:nth-child(even) td{background:#fafafa}
.pdf-cond{border:1px solid #ddd;border-radius:3px;overflow:hidden;margin-bottom:12px}
.pdf-cond-t{background:#111;color:#fff;padding:6px 12px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.06em}
.pdf-cr{display:flex;border-bottom:.5px solid #eee}
.pdf-cr:last-child{border-bottom:none}
.pdf-cl{background:#f5f5f5;padding:6px 10px;font-weight:600;color:#666;width:210px;flex-shrink:0;font-size:9.5px}
.pdf-cv{padding:6px 10px;color:#111;font-size:9.5px}
.pdf-notes{background:#f9f9f9;border:1px solid #ddd;border-radius:3px;padding:10px 12px;font-size:9.5px;color:#666;margin-bottom:12px;line-height:1.65;white-space:pre-wrap}
.pdf-notes-t{font-weight:700;font-size:9px;text-transform:uppercase;letter-spacing:.06em;color:#444;margin-bottom:5px}
.pdf-foot{border-top:1px solid #23B24B;padding-top:9px;display:flex;justify-content:space-between;font-size:9.5px;color:#777}
.pdf-contact{margin-top:8px;padding:6px 12px;background:#f0faf4;border:1px solid #b8e0c8;border-radius:3px;font-size:9.5px;display:flex;justify-content:space-between;align-items:center}

/* CLIENTS LIST */
.client-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 18px;display:flex;align-items:center;gap:12px;margin-bottom:8px;cursor:pointer;transition:all .15s}
.client-card:hover{border-color:var(--green);box-shadow:0 0 0 3px rgba(35,178,75,.08)}
.client-avatar{width:38px;height:38px;border-radius:8px;background:var(--green-l);color:var(--green-h);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0}
.client-name{font-size:14px;font-weight:600}
.client-meta{font-size:12px;color:var(--text2);margin-top:2px}

/* TEMPLATES */
.tpl-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 18px;margin-bottom:8px;cursor:pointer;transition:all .15s}
.tpl-card:hover{border-color:var(--green);background:var(--green-ll)}
.tpl-card.selected{border-color:var(--green);background:var(--green-ll);box-shadow:0 0 0 3px rgba(35,178,75,.1)}
.tpl-name{font-size:13px;font-weight:700}
.tpl-meta{font-size:11px;color:var(--text2);margin-top:3px}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px}
.stat-val{font-size:24px;font-weight:700;color:var(--text)}
.stat-label{font-size:11px;color:var(--text3);margin-top:4px}
.stat-green .stat-val{color:var(--green)}

/* UTILS */
.row{display:flex;gap:12px;align-items:center}
.spacer{flex:1}
.divider{height:1px;background:var(--border2);margin:20px 0}
.tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600}
.tag-green{background:var(--green-l);color:var(--green-h)}
.empty{text-align:center;padding:52px 24px;color:var(--text3)}
.empty i{font-size:48px;display:block;margin-bottom:14px;opacity:.25}
.section-actions{display:flex;justify-content:flex-end;margin-bottom:14px;gap:8px}
.tip{background:var(--blue-l);border:1px solid #c0ddf0;border-radius:var(--radius-sm);padding:10px 14px;font-size:12px;color:#1a5f8a;display:flex;gap:10px;align-items:flex-start;margin-bottom:16px}
.tip i{flex-shrink:0;margin-top:1px}

/* SCROLLBAR */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#ccc;border-radius:3px}

@media print{
  .sidebar,.topbar,.btn-row,.no-print{display:none!important}
  .main{margin-left:0}
  .page{padding:0}
  .preview-bg{background:white;padding:0}
  .pdf{box-shadow:none;padding:20px}
}
</style>
</head>
<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="sb-logo">
    <div class="sb-name">resaicar<span class="sb-dot"> ●</span></div>
    <div class="sb-tag">CIENCIA <span class="sb-tag-plus">+</span> TECNOLOGÍA</div>
  </div>
  <nav class="sb-nav">
    <div class="sb-section">Documentos</div>
    <div class="sb-item active" onclick="showPage('nuevo')" id="nav-nuevo"><i class="ti ti-file-plus"></i> Nuevo presupuesto</div>
    <div class="sb-item" onclick="showPage('historial')" id="nav-historial"><i class="ti ti-history"></i> Historial</div>
    <div class="sb-section">Configuración</div>
    <div class="sb-item" onclick="showPage('clientes')" id="nav-clientes"><i class="ti ti-users"></i> Clientes</div>
    <div class="sb-item" onclick="showPage('catalogo')" id="nav-catalogo"><i class="ti ti-package"></i> Catálogo</div>
    <div class="sb-item" onclick="showPage('plantillas')" id="nav-plantillas"><i class="ti ti-template"></i> Plantillas</div>
    <div class="sb-item" onclick="showPage('empresa')" id="nav-empresa"><i class="ti ti-building"></i> Mi empresa</div>
  </nav>
  <div class="sb-footer"><div class="sb-version">v2.0 — Resaicar Docs</div></div>
</div>

<!-- MAIN -->
<div class="main">
  <div class="topbar">
    <div>
      <div class="tb-title" id="tb-title">Nuevo presupuesto</div>
      <div class="tb-sub" id="tb-sub">Complete los datos paso a paso</div>
    </div>
    <div class="tb-actions" id="tb-actions"></div>
  </div>

  <!-- PAGES -->
  <div class="page" id="page-nuevo"></div>
  <div class="page" id="page-historial" style="display:none"></div>
  <div class="page" id="page-clientes" style="display:none"></div>
  <div class="page" id="page-catalogo" style="display:none"></div>
  <div class="page" id="page-plantillas" style="display:none"></div>
  <div class="page" id="page-empresa" style="display:none"></div>
</div>

<!-- MODAL CATÁLOGO -->
<div class="modal-bg" id="cat-modal">
  <div class="modal">
    <div class="modal-head">
      <div class="modal-title"><i class="ti ti-package" style="color:var(--green)"></i> Catálogo de productos</div>
      <button class="btn-icon" onclick="closeCatModal()"><i class="ti ti-x"></i></button>
    </div>
    <input class="cat-search" type="text" placeholder="Buscar producto o servicio..." id="cat-search" oninput="renderCatModal()">
    <div id="cat-modal-list"></div>
  </div>
</div>

<!-- MODAL CLIENTE -->
<div class="modal-bg" id="cli-modal">
  <div class="modal">
    <div class="modal-head">
      <div class="modal-title"><i class="ti ti-users" style="color:var(--green)"></i> Seleccionar cliente</div>
      <button class="btn-icon" onclick="closeCliModal()"><i class="ti ti-x"></i></button>
    </div>
    <input type="text" placeholder="Buscar cliente..." id="cli-search" oninput="renderCliModal()" style="margin-bottom:14px">
    <div id="cli-modal-list"></div>
  </div>
</div>

function nextNr(){
  const y = new Date().getFullYear();
  if(!DB.historial.length) return `N0001-${y}`;
  const nums = DB.historial.map(h=>{ const m=h.numero.match(/N(\d+)/); return m?parseInt(m[1]):0; });
  return `N${String(Math.max(...nums)+1).padStart(4,'0')}-${y}`;
}

function renderWizard(){
  const b = document.getElementById('page-nuevo');

  // Progress
  const dots = STEPS.map((s,i)=>`
    <div class="prog-step ${i<step?'done':i===step?'active':''}">
      <div class="prog-dot-wrap">
        <div class="prog-dot">${i<step?'<i class="ti ti-check" style="font-size:11px"></i>':i+1}</div>
        <div class="prog-label">${s}</div>
      </div>
    </div>`).join('');

  let stepHtml = '';

  if(step===0) stepHtml = renderStep0();
  else if(step===1) stepHtml = renderStep1();
  else if(step===2) stepHtml = renderStep2();
  else if(step===3) stepHtml = renderStep3();
  else if(step===4) stepHtml = renderStep4();

  b.innerHTML = `
    <div class="progress no-print">${dots}</div>
    ${stepHtml}`;

  if(step===2) bindItemEvents();
}

function bindItemEvents(){
  doc.items.forEach((_,i)=>{
    const d=document.getElementById(`it-desc-${i}`);
    const c=document.getElementById(`it-cant-${i}`);
    const p=document.getElementById(`it-precio-${i}`);
    if(d) d.addEventListener('input',()=>{ doc.items[i].desc=d.value; });
    if(c) c.addEventListener('input',()=>{ doc.items[i].cant=c.value; recalcRow(i); });
  });
}

function recalcRow(i){
  const c=parseFloat(document.getElementById(`it-cant-${i}`)?.value||0);
  const p=parseFloat(document.getElementById(`it-precio-${i}`)?.value||0);
  const t=(c*p);
  doc.items[i].total=t.toFixed(2);
  const el=document.getElementById(`it-total-${i}`);
  if(el) el.textContent=t?fmt(t):'—';
  updateTotalBar();
}

function updateTotalBar(){
  const t=calcTotal();
  const el=document.getElementById('total-display');
  if(el) el.textContent=`${doc.moneda} ${fmt(t)}`;
}

function calcTotal(){
  return doc.items.reduce((s,it)=>s+(parseFloat(it.total||0)),0);
}

function readItems(){
  doc.items = doc.items.map((_,i)=>({
    desc: document.getElementById(`it-desc-${i}`)?.value||doc.items[i].desc,
    cant: document.getElementById(`it-cant-${i}`)?.value||doc.items[i].cant,
    precio: document.getElementById(`it-precio-${i}`)?.value||doc.items[i].precio,
    total: doc.items[i].total||'0'
  }));
}

function addItem(){
  readItems();
  doc.items.push({desc:'',cant:'1',precio:'',total:''});
  renderWizard();
}

function removeItem(i){
  readItems();
  doc.items.splice(i,1);
  renderWizard();
}

function saveItemsGo(n){
  readItems();
  step=n;renderWizard();
}

// NAVIGATION LOGIC
// ═══════════════════════════════════════════════════════
function go(n){
  if(step===0){
    doc.fecha=document.getElementById('f-fecha').value;
    doc.numero=document.getElementById('f-numero').value;
    doc.referencia=document.getElementById('f-ref').value;
  } else if(step===1){
    doc.cliente=document.getElementById('f-cliente').value;
    doc.usuario=document.getElementById('f-usuario').value;
    doc.puesto=document.getElementById('f-puesto').value;
    doc.cuit_cli=document.getElementById('f-cuit').value;
    doc.sector=document.getElementById('f-sector').value;
    doc.domicilio_cli=document.getElementById('f-dom').value;
    // Save client if checked
    const saveCheck=document.getElementById('f-guardar-cli');
    if(saveCheck&&saveCheck.checked&&doc.cliente){
      const exists=DB.clientes.find(c=>c.nombre===doc.cliente);
      if(!exists){
        DB.clientes.push({id:Date.now(),nombre:doc.cliente,usuario:doc.usuario,puesto:doc.puesto,cuit:doc.cuit_cli,sector:doc.sector,domicilio:doc.domicilio_cli});
        save('clientes');
      }
    }
  } else if(step===3){
    doc.moneda=document.getElementById('f-moneda').value;
    doc.forma_pago=document.getElementById('f-fpago').value;
    doc.entrega=document.getElementById('f-entrega').value;
    doc.fecha_entrega=document.getElementById('f-fentrega').value;
    doc.validez=document.getElementById('f-validez').value;
    doc.obs=document.getElementById('f-obs').value;
    doc.nota_interna=document.getElementById('f-nota').value;
    if(doc.cnt_custom){
      doc.cnt_nombre=document.getElementById('f-cnt-nombre')?.value||DB.cfg.cnt_nombre;
      doc.cnt_dpto=document.getElementById('f-cnt-dpto')?.value||DB.cfg.cnt_dpto;
      doc.cnt_email=document.getElementById('f-cnt-email')?.value||DB.cfg.cnt_email;
    } else {
      doc.cnt_nombre=DB.cfg.cnt_nombre;
      doc.cnt_dpto=DB.cfg.cnt_dpto;
      doc.cnt_email=DB.cfg.cnt_email;
    }
  }
  step=n; renderWizard();
  window.scrollTo(0,0);
}

  const total=calcTotal();

function renderHistorial(){
  const p=document.getElementById('page-historial');
  // Stats
  const total=DB.historial.length;
  const enviados=DB.historial.filter(h=>h.estado==='Enviado').length;
  const aceptados=DB.historial.filter(h=>h.estado==='Aceptado').length;
  const monto=DB.historial.reduce((s,h)=>s+h.total,0);

  const items = DB.historial.length?DB.historial.map(h=>`
    <div class="hist-item">
      <div style="flex:1">
        <div class="hist-nr">${h.numero} <span class="badge badge-${h.estado.toLowerCase()}">${h.estado}</span></div>
        <div class="hist-client"><strong>${h.cliente}</strong></div>
        <div class="hist-date">${fmtDate(h.fecha)}${h.nota_interna?` &nbsp;·&nbsp; <span style="color:var(--amber)"><i class="ti ti-note"></i> Nota interna</span>`:''}</div>
      </div>
      <div style="margin-right:10px">
        <select class="status-sel" onchange="cambiarEstado(${h.id},this.value)">
          ${['Presupuesto','Enviado','Aceptado','Rechazado'].map(s=>`<option ${h.estado===s?'selected':''}>${s}</option>`).join('')}
        </select>
      </div>
      <div class="hist-total">${h.moneda} ${fmt(h.total)}</div>
      <div style="display:flex;gap:6px">
        <button class="btn btn-ghost btn-sm" onclick="verDoc(${h.id})"><i class="ti ti-eye"></i> Ver</button>
        <button class="btn btn-ghost btn-sm" onclick="duplicarDoc(${h.id})"><i class="ti ti-copy"></i></button>
        <button class="btn-icon" onclick="borrarDoc(${h.id})" style="color:var(--red)"><i class="ti ti-trash" style="font-size:14px"></i></button>
      </div>
    </div>`).join('')
    :`<div class="empty"><i class="ti ti-file-off"></i><div style="font-size:15px;font-weight:600">Sin documentos todavía</div><div style="margin-top:6px;font-size:13px">Creá tu primer presupuesto</div></div>`;

  p.innerHTML=`
    <div class="stats">
      <div class="stat"><div class="stat-val">${total}</div><div class="stat-label">Presupuestos totales</div></div>
      <div class="stat"><div class="stat-val">${enviados}</div><div class="stat-label">Enviados</div></div>
      <div class="stat stat-green"><div class="stat-val">${aceptados}</div><div class="stat-label">Aceptados</div></div>
      <div class="stat stat-green"><div class="stat-val">USD ${fmt(monto)}</div><div class="stat-label">Monto total cotizado</div></div>
    </div>
    ${items}`;
}

function cambiarEstado(id,estado){
  const h=DB.historial.find(x=>x.id===id);
  if(h){h.estado=estado;save('historial');}
}

function verDoc(id){
  const h=DB.historial.find(x=>x.id===id);
  if(!h) return;
  doc=JSON.parse(JSON.stringify(h.snapshot));
  step=4; showPage('nuevo'); renderWizard();
}

function duplicarDoc(id){
  const h=DB.historial.find(x=>x.id===id);
  if(!h) return;
  doc=JSON.parse(JSON.stringify(h.snapshot));
  doc.numero=nextNr();
  doc.fecha=new Date().toISOString().split('T')[0];
  step=0; showPage('nuevo'); renderWizard();
}

function borrarDoc(id){
  if(!confirm('¿Eliminar este presupuesto del historial?')) return;
  DB.historial=DB.historial.filter(x=>x.id!==id);
  save('historial'); renderHistorial();
}

function editTpl(id){ newTplForm(DB.plantillas.find(x=>x.id===id)); }

function saveTpl(id){
  const data={id:id||Date.now(),nombre:document.getElementById('tplf-nombre').value,moneda:document.getElementById('tplf-moneda').value,forma_pago:document.getElementById('tplf-fpago').value,entrega:document.getElementById('tplf-entrega').value,fecha_entrega:document.getElementById('tplf-fentrega').value,validez:document.getElementById('tplf-validez').value};
  if(id){ const i=DB.plantillas.findIndex(x=>x.id===id); if(i>=0) DB.plantillas[i]=data; }
  else DB.plantillas.push(data);
  save('plantillas'); renderPlantillasPage();
}

function borrarTpl(id){
  if(!confirm('¿Eliminar esta plantilla?')) return;
  DB.plantillas=DB.plantillas.filter(x=>x.id!==id);
  save('plantillas'); renderPlantillasPage();
}

let catTargetRow = null;

function openCatModal(){ document.getElementById('cat-modal').classList.add('open'); document.getElementById('cat-search').value=''; renderCatModal(); }
function closeCatModal(){ document.getElementById('cat-modal').classList.remove('open'); }

function renderCatModal(){
  const q=(document.getElementById('cat-search').value||'').toLowerCase();
  const items=DB.catalogo.filter(c=>!q||c.nombre.toLowerCase().includes(q)||c.desc.toLowerCase().includes(q));
  document.getElementById('cat-modal-list').innerHTML=items.length?
    items.map(c=>`<div class="cat-item" onclick="insertCatItem(${c.id})">
      <div><div class="cat-item-name">${c.nombre} <span class="tag tag-green">${c.categoria}</span></div><div class="cat-item-desc">${c.desc}</div></div>
      <div class="cat-item-price">${c.moneda} ${fmt(c.precio)}</div>
    </div>`).join('')
    :`<div class="cat-empty"><i class="ti ti-search" style="font-size:32px;display:block;margin-bottom:8px;opacity:.3"></i>Sin resultados</div>`;
}

function insertCatItem(id){
  readItems();
  const c=DB.catalogo.find(x=>x.id===id);
  if(!c) return;
  // Find first empty row or add new
  const empty=doc.items.findIndex(it=>!it.desc&&!it.precio);
  const entry={desc:c.nombre+(c.desc?'\n'+c.desc:''),cant:'1',precio:String(c.precio),total:String(c.precio)};
  if(empty>=0) doc.items[empty]=entry;
  else doc.items.push(entry);
  doc.moneda=c.moneda;
  closeCatModal();
  step=2; renderWizard();
}

function openCliModal(){ document.getElementById('cli-modal').classList.add('open'); document.getElementById('cli-search').value=''; renderCliModal(); }
function closeCliModal(){ document.getElementById('cli-modal').classList.remove('open'); }

function renderCliModal(){
  const q=(document.getElementById('cli-search').value||'').toLowerCase();
  const items=DB.clientes.filter(c=>!q||c.nombre.toLowerCase().includes(q));
  document.getElementById('cli-modal-list').innerHTML=items.length?
    items.map(c=>`<div class="client-card" onclick="loadClient(${c.id})">
      <div class="client-avatar">${(c.nombre||'?').charAt(0)}</div>
      <div><div class="client-name">${c.nombre}</div><div class="client-meta">${c.cuit||''} · ${c.sector||''}</div></div>
    </div>`).join('')
    :`<div class="empty" style="padding:24px"><i class="ti ti-users" style="font-size:32px;display:block;margin-bottom:8px;opacity:.3"></i>Sin clientes guardados</div>`;
}

function loadClient(id){
  const c=DB.clientes.find(x=>x.id===id);
  if(!c) return;
  doc.cliente=c.nombre; doc.usuario=c.usuario||''; doc.puesto=c.puesto||'';
  doc.cuit_cli=c.cuit||''; doc.sector=c.sector||''; doc.domicilio_cli=c.domicilio||'';
  closeCliModal();
  step=1; renderWizard();
}

// Close modals on bg click
document.getElementById('cat-modal').addEventListener('click',e=>{ if(e.target===e.currentTarget) closeCatModal(); });
document.getElementById('cli-modal').addEventListener('click',e=>{ if(e.target===e.currentTarget) closeCliModal(); });

// HELPERS
// ═══════════════════════════════════════════════════════
function fmt(v){ return parseFloat(v||0).toLocaleString('es-AR',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function fmtDate(d){ if(!d) return ''; return new Date(d+'T12:00:00').toLocaleDateString('es-AR'); }

function numWords(n){
  n=Math.floor(n);
  const u=['','UNO','DOS','TRES','CUATRO','CINCO','SEIS','SIETE','OCHO','NUEVE','DIEZ','ONCE','DOCE','TRECE','CATORCE','QUINCE','DIECISÉIS','DIECISIETE','DIECIOCHO','DIECINUEVE'];
  const d=['','','VEINTE','TREINTA','CUARENTA','CINCUENTA','SESENTA','SETENTA','OCHENTA','NOVENTA'];
  const h=['','CIEN','DOSCIENTOS','TRESCIENTOS','CUATROCIENTOS','QUINIENTOS','SEISCIENTOS','SETECIENTOS','OCHOCIENTOS','NOVECIENTOS'];
  if(n===0) return 'CERO';
  if(n<20) return u[n];
  if(n<100) return d[Math.floor(n/10)]+(n%10?' Y '+u[n%10]:'');
  if(n<1000) return (n===100?'CIEN':h[Math.floor(n/100)])+(n%100?' '+numWords(n%100):'');
  if(n<1000000){ const m=Math.floor(n/1000); return(m===1?'MIL':numWords(m)+' MIL')+(n%1000?' '+numWords(n%1000):''); }
  return String(n);
}
